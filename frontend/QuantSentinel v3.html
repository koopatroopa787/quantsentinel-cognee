<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>QuantSentinel · Research Terminal</title>
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet"/>
  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body, #root { height: 100%; font-family: 'Space Grotesk', system-ui, sans-serif; }
    body {
      background-color: #0c0c0c;
      background-image:
        linear-gradient(rgba(96,108,56,0.07) 1px, transparent 1px),
        linear-gradient(90deg, rgba(96,108,56,0.07) 1px, transparent 1px);
      background-size: 36px 36px;
    }
    ::-webkit-scrollbar { width: 5px; height: 5px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: rgba(96,108,56,0.35); border-radius: 3px; }
    ::-webkit-scrollbar-thumb:hover { background: rgba(221,161,94,0.45); }
    @keyframes q2Pulse   { 0%,100%{opacity:1} 50%{opacity:0.2} }
    @keyframes q2Shimmer { 0%{transform:translateX(-220%)} 100%{transform:translateX(440%)} }
    @keyframes q2Bounce  { 0%,100%{transform:translateY(0)} 50%{transform:translateY(-5px)} }
    @keyframes q2FadeIn  { from{opacity:0;transform:translateY(6px)} to{opacity:1;transform:translateY(0)} }
    textarea, button, input { font-family: inherit; }
    textarea { color-scheme: dark; }
    textarea::placeholder { color: rgba(71,85,105,0.75); }
  </style>
</head>
<body>
<div id="root"></div>

<script type="text/babel" src="qs3-core.jsx"></script>
<script type="text/babel" src="qs3-layout.jsx"></script>
<script type="text/babel" src="qs3-timeline.jsx"></script>
<script type="text/babel" src="qs3-dashboard.jsx"></script>
<script type="text/babel" src="tweaks-panel.jsx"></script>

<script type="text/babel">
// ─── Mock series ──────────────────────────────────────────────────────────────
const MOCK_SERIES = (() => {
  let s = 31337;
  const r = () => { s = (s * 1664525 + 1013904223) >>> 0; return s / 0xFFFFFFFF - 0.5; };
  let eq = 1, bn = 1, pk = 1;
  return Array.from({length: 120}, (_, i) => {
    eq = Math.max(0.05, eq * (1 + r() * 0.034 + 0.0026));
    bn = Math.max(0.05, bn * (1 + r() * 0.024 + 0.0018));
    pk = Math.max(pk, eq);
    const d = new Date('2015-01-01');
    d.setDate(d.getDate() + Math.round(i * 30.4));
    return { date: d.toISOString().slice(0,10), equity: eq, benchmark: bn, drawdown: (eq - pk) / pk };
  });
})();
const finalEq = MOCK_SERIES[MOCK_SERIES.length - 1].equity;
const finalBn = MOCK_SERIES[MOCK_SERIES.length - 1].benchmark;

const MOCK_METRICS = {
  ticker: 'SPY', start_date: '2015-01-01', end_date: '2024-12-31',
  total_return: finalEq - 1, benchmark_total_return: finalBn - 1,
  alpha: (finalEq - 1) - (finalBn - 1),
  sharpe: 1.34, max_drawdown: -0.187, win_rate: 0.584, num_trades: 47,
  t_statistic: 2.847, p_value: 0.0048, significant_at_5pct: true,
  bootstrap_lower: 0.000284, bootstrap_upper: 0.001847, bootstrap_mean: 0.001065,
  series: MOCK_SERIES,
};
const MOCK_SCORES = { faithfulness: 0.87, stats_correctness: 0.79, hallucination: 0.92, risk_caveats: 0.74, overall: 0.83 };
const MOCK_STEPS_DONE = [
  { agent: 'orchestrator',        status: 'done',    message: 'Decomposed into 4 tasks: data retrieval, backtest execution, statistical analysis, memo generation.', startedAt: Date.now() - 48000 },
  { agent: 'data_agent',          status: 'done',    message: 'Fetched 2,520 trading days of SPY OHLCV via yfinance (2015–2024). FRED macro dates retrieved.',        startedAt: Date.now() - 38000 },
  { agent: 'backtester_agent',    status: 'done',    message: 'Backtest complete — 47 trades. Strategy +84.7% vs benchmark +62.1%.',                                  startedAt: Date.now() - 27000 },
  { agent: 'statistician_agent',  status: 'done',    message: 'Analysis complete: p = 0.0048 (significant), Sharpe = 1.34, 95% bootstrap CI does not span zero.',    startedAt: Date.now() - 16000 },
  { agent: 'critic_agent',        status: 'done',    message: 'Research memo written — 8 sections covering hypothesis, methodology, results, and risk caveats.',      startedAt: Date.now() - 7000  },
];
const MOCK_STEPS_RUNNING = [
  { agent: 'orchestrator', status: 'done',    message: 'Decomposing hypothesis into research plan…',                                         startedAt: Date.now() - 7000 },
  { agent: 'data_agent',   status: 'running', message: 'Fetching market data from yfinance…', heartbeat: 'Downloading SPY OHLCV 2015–2024 · 2,318 / 2,520 bars…', startedAt: Date.now() - 3200 },
];
const MOCK_SUGGESTION = {
  title: 'Add VIX regime filter to reduce drawdown',
  rationale: 'The current strategy shows elevated drawdown during high-volatility regimes. Adding a VIX < 20 filter may improve risk-adjusted returns by avoiding trades when market fear is elevated.',
  new_hypothesis: 'Does holding SPY only when its monthly close is above the 10-month SMA AND VIX is below 20 outperform a standard SMA strategy from 2010 to 2024?',
  priority: 'high',
};
const MOCK_MEMO = `1. HYPOTHESIS
Does a 14-day RSI below 30 on SPY generate significant mean-reversion returns over 5 trading days from 2015 to 2024?

2. DATA SOURCES
- SPY daily OHLCV data via yfinance (2015-01-01 to 2024-12-31)
- 2,520 trading days, adjusted for splits and dividends

3. METHODOLOGY
- RSI calculated using 14-day Wilder smoothing
- Entry: RSI crosses below 30 (oversold threshold)
- Holding period: 5 trading days from signal date
- Benchmark: SPY buy-and-hold over the same period

4. RESULTS
Total Return: +84.7%
Benchmark Return: +62.1%
Alpha: +22.6%
Sharpe Ratio: 1.34
Max Drawdown: -18.7%
Win Rate: 58.4%
Number of Trades: 47

5. STATISTICAL ANALYSIS
t-statistic: 2.847
p-value: 0.0048 (significant at 5% level)
95% Bootstrap CI: [0.000284, 0.001847] — positive edge confirmed

6. RISK CAVEATS
- Strategy is sensitive to RSI parameter choice; 14-day window may be overfit
- Small sample size (47 trades) limits statistical power
- Transaction costs and slippage not modeled
- Performance may degrade in sustained trending markets

7. CONCLUSION
The 14-day RSI mean-reversion strategy on SPY demonstrates statistically significant positive returns over 2015–2024, with a Sharpe ratio of 1.34 and alpha of +22.6% vs buy-and-hold. The bootstrap CI confirms a genuine edge, though the limited trade count warrants caution before live deployment.

8. DISCLAIMER
For research and educational purposes only. Past performance is not indicative of future results. This does not constitute financial advice.`;

const MOCK_HISTORY = [
  { hypothesis: 'Does holding SPY when monthly close is above the 10-month SMA outperform buy-and-hold from 2010 to 2024?', score: 0.65, timestamp: '2026-05-05T12:00:00Z' },
  { hypothesis: 'Does holding SPY when VIX is below its 200-day moving average generate better risk-adjusted returns?',        score: 0.60, timestamp: '2026-05-04T10:30:00Z' },
  { hypothesis: 'Does a strategy holding SPY when its 12-month return is positive and bonds otherwise outperform?',           score: 0.72, timestamp: '2026-05-03T09:15:00Z' },
];
const MOCK_IMPROVEMENT = Array.from({length: 14}, (_, i) => ({
  timestamp: new Date(Date.now() - (13-i) * 86400000).toISOString(),
  overall:   +(0.50 + i * 0.029 + Math.sin(i * 0.85) * 0.022).toFixed(3),
}));

// ─── App ──────────────────────────────────────────────────────────────────────
const TWEAK_DEFAULTS = /*EDITMODE-BEGIN*/{
  "viewState": "results"
}/*EDITMODE-END*/;

function App() {
  const [t, setTweak]       = useTweaks(TWEAK_DEFAULTS);
  const [hypothesis, setHypothesis] = React.useState('');
  const view       = t.viewState || 'results';
  const isRunning  = view === 'running';
  const hasResults = view === 'results';

  const steps       = view === 'idle' ? [] : isRunning ? MOCK_STEPS_RUNNING : MOCK_STEPS_DONE;
  const scores      = hasResults ? MOCK_SCORES : { faithfulness:0, stats_correctness:0, hallucination:0, risk_caveats:0, overall:0 };
  const history     = view === 'idle' ? [] : MOCK_HISTORY;
  const improvement = hasResults ? MOCK_IMPROVEMENT : [];
  const tokens      = hasResults ? { input: 18420, output: 4231 } : { input: 0, output: 0 };

  return (
    <div style={{ display:'flex', flexDirection:'column', height:'100vh', overflow:'hidden' }}>
      <TopBar running={isRunning}/>

      <div style={{ flex:1, overflowY:'auto', padding:'24px 28px', display:'flex', flexDirection:'column', gap:16 }}>
        <div style={{ display:'grid', gridTemplateColumns:'262px 1fr 278px', gap:16, alignItems:'start' }}>

          <LeftCol
            hypothesis={hypothesis} setHypothesis={setHypothesis}
            onRun={() => setTweak('viewState','running')}
            running={isRunning} tokens={tokens} history={history}
            canRun={hypothesis.trim().length >= 5 && !isRunning}
          />

          <div style={{ display:'flex', flexDirection:'column', gap:16 }}>
            <AgentTimeline2 steps={steps} running={isRunning}/>
            {hasResults && (
              <ResearchDashboard2
                metrics={MOCK_METRICS} scores={scores}
                memo={MOCK_MEMO} suggestion={MOCK_SUGGESTION}
                traceUrl="https://phoenix.arize.com"
                onRunSuggestion={h => { setHypothesis(h); setTweak('viewState','running'); }}
              />
            )}
          </div>

          <RightCol scores={scores} improvement={improvement}/>
        </div>
        <div style={{ height:8 }}/>
      </div>

      <TweaksPanel>
        <TweakSection label="Prototype State"/>
        <TweakRadio label="View" value={t.viewState} options={['idle','running','results']}
          onChange={v => setTweak('viewState', v)}/>
      </TweaksPanel>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
