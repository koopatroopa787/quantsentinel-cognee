apiVersion: run.googleapis.com/v1
kind: Job
metadata:
  name: quantsentinel-optimizer
spec:
  template:
    spec:
      template:
        spec:
          containers:
            - image: gcr.io/${PROJECT_ID}/quantsentinel-backend
              command: ["python", "-m", "optimizer.nightly_optimizer"]
              env:
                - name: GOOGLE_CLOUD_PROJECT
                  value: "${PROJECT_ID}"
                - name: GOOGLE_CLOUD_LOCATION
                  value: "us-central1"
                - name: GOOGLE_GENAI_USE_VERTEXAI
                  value: "TRUE"
          timeoutSeconds: 1800
          serviceAccountName: quantsentinel-sa

